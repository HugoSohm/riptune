name: Bug Report
description: Report a bug to help us improve RipTune.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you did and what happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Provide a step-by-step guide on how to reproduce the bug.
      placeholder: 1. Open RipTune...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RipTune Version
      description: Check the version in the app or package.json.
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux (Ubuntu/Debian)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste any error logs from the terminal or attach screenshots.
