name: "Publish Release"

on:
  push:
    branches:
      - main

jobs:
  check-version:
    name: "Check Version"
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      body: ${{ steps.check.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check version and extract changelog
        id: check
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            
            # Extract changelog
            node -e "
              const fs = require('fs');
              const version = '$VERSION';
              const content = fs.readFileSync('Changelog.md', 'utf8').split('\n');
              const startIdx = content.findIndex(l => l.startsWith('## ' + version));
              if (startIdx === -1) {
                fs.writeFileSync('extracted_changelog.txt', '### Version ' + version + '\n\nInitial Release');
                process.exit(0);
              }
              const nextIdx = content.slice(startIdx + 1).findIndex(l => l.startsWith('## '));
              const body = content.slice(startIdx + 1, nextIdx === -1 ? undefined : startIdx + 1 + nextIdx).join('\n').trim();
              fs.writeFileSync('extracted_changelog.txt', body);
            "
            
            DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "body<<$DELIMITER" >> $GITHUB_OUTPUT
            cat extracted_changelog.txt >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$DELIMITER" >> $GITHUB_OUTPUT
          fi

  build:
    name: "Build ${{ matrix.os_name }}"
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest-amd64, macos-latest-arm64, ubuntu-22.04, windows-latest, windows-latest-arm64]
        include:
          - platform: macos-latest-arm64
            real_platform: macos-latest
            arch: aarch64
            os_name: "macOS (Apple Silicon)"
            args: "--target aarch64-apple-darwin --bundles app"
          - platform: macos-latest-amd64
            real_platform: macos-latest
            arch: x64
            os_name: "macOS (Intel)"
            args: "--target x86_64-apple-darwin --bundles app"
          - platform: ubuntu-22.04
            real_platform: ubuntu-22.04
            arch: x64
            os_name: "Linux"
            args: ""
          - platform: windows-latest
            real_platform: windows-latest
            arch: x64
            os_name: "Windows (x64)"
            args: ""
          - platform: windows-latest-arm64
            real_platform: windows-latest
            arch: arm64
            os_name: "Windows (ARM64)"
            args: "--target aarch64-pc-windows-msvc"

    runs-on: ${{ matrix.real_platform }}
    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.real_platform == 'macos-latest' && (matrix.arch == 'x64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin') || (matrix.real_platform == 'windows-latest' && matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || '') }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.real_platform }}-${{ matrix.arch }}

      - name: install dependencies (ubuntu only)
        if: matrix.real_platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: setup bins (Windows)
        if: matrix.real_platform == 'windows-latest'
        run: ./setup_bin.ps1

      - name: setup bins (Unix)
        if: matrix.real_platform != 'windows-latest'
        run: chmod +x setup_bin.sh && ./setup_bin.sh

      - name: install frontend dependencies
        run: npm install

      - name: build and bundle
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APTABASE_API_KEY: ${{ secrets.APTABASE_API_KEY }}
        with:
          args: ${{ matrix.args }}

      - name: Package macOS DMG
        if: matrix.real_platform == 'macos-latest'
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          chmod +x scripts/macos/build.sh
          ARCH_OVERRIDE="${{ matrix.arch }}" ./scripts/macos/build.sh
          
          # Re-sign the final custom DMG using the correct environment variable
          DMG_FILE=$(ls dist/RipTune_${VERSION}_*.dmg | head -n 1)
          npx tauri signer sign -k "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" "$DMG_FILE" --password "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" > raw_output.txt
          
          # Extract ONLY the base64 signature
          sed -n '/Public signature:/,$p' raw_output.txt | sed '1d' | sed '/Make sure to/d' > "${DMG_FILE}.sig"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.exe.sig
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.AppImage.sig
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.rpm
            dist/*.dmg
            dist/*.dmg.sig

  publish:
    name: "Publish Release"
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./all-artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ needs.check-version.outputs.body }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release create $VERSION \
            --title "RipTune $VERSION" \
            --notes "$RELEASE_NOTES" \
            --draft

      - name: Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          find ./all-artifacts -type f \( -name "*.dmg" -o -name "*.dmg.sig" -o -name "*.exe" -o -name "*.exe.sig" -o -name "*.AppImage" -o -name "*.AppImage.sig" -o -name "*.deb" -o -name "*.rpm" \) -exec gh release upload $VERSION {} --clobber \;

      - name: Generate and upload latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ASSETS=$(gh release view $VERSION --json assets --jq '.assets')
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$VERSION"
          
          # Improved asset selection to avoid arch mixup and "untagged" draft URLs
          WIN_X64_NAME=$(echo "$ASSETS" | jq -r '.[] | select(.name | contains("_x64") and endswith(".exe")) | .name' | head -n 1)
          if [ -z "$WIN_X64_NAME" ] || [ "$WIN_X64_NAME" == "null" ]; then
            WIN_X64_NAME=$(echo "$ASSETS" | jq -r '.[] | select(.name | (contains("_arm64") | not) and endswith(".exe")) | .name' | head -n 1)
          fi
          
          WIN_ARM64_NAME=$(echo "$ASSETS" | jq -r '.[] | select(.name | contains("_arm64") and endswith(".exe")) | .name' | head -n 1)
          MAC_X64_NAME=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_x64.dmg")) | .name' | head -n 1)
          MAC_ARM_NAME=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_aarch64.dmg")) | .name' | head -n 1)
          LINUX_NAME=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".AppImage")) | .name' | head -n 1)

          # Construct URLs manually to avoid "untagged" URLs from draft releases
          WIN_X64_URL="${BASE_URL}/${WIN_X64_NAME}"
          WIN_ARM64_URL="${BASE_URL}/${WIN_ARM64_NAME}"
          MAC_X64_URL="${BASE_URL}/${MAC_X64_NAME}"
          MAC_ARM_URL="${BASE_URL}/${MAC_ARM_NAME}"
          LINUX_URL="${BASE_URL}/${LINUX_NAME}"

            get_sig() {
              local bundle_name=$1
              if [ -z "$bundle_name" ] || [ "$bundle_name" == "null" ]; then
                echo ""
                return
              fi
              
              local sig_name=$(echo "$ASSETS" | jq -r ".[] | select(.name == \"${bundle_name}.sig\") | .name" | head -n 1)
              if [ "$sig_name" != "null" ] && [ -n "$sig_name" ]; then
                # Download the signature and use $(...) to let Bash strip ONLY the trailing newline
                local content=$(gh release download $VERSION -p "$sig_name" -O -)
                # Use printf %s to encode exactly the 4 lines in Base64
                printf "%s" "$content" | base64 -w 0
              else
                echo ""
              fi
            }

          WIN_X64_SIG=$(get_sig "$WIN_X64_NAME")
          WIN_ARM64_SIG=$(get_sig "$WIN_ARM64_NAME")
          MAC_X64_SIG=$(get_sig "$MAC_X64_NAME")
          MAC_ARM_SIG=$(get_sig "$MAC_ARM_NAME")
          LINUX_SIG=$(get_sig "$LINUX_NAME")

          # JSON construction using jq to handle escaping correctly
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Version $VERSION release" \
            --arg pub_date "$DATE" \
            --arg win_x64_url "$WIN_X64_URL" --arg win_x64_sig "$WIN_X64_SIG" \
            --arg win_arm_url "$WIN_ARM64_URL" --arg win_arm_sig "$WIN_ARM64_SIG" \
            --arg mac_x64_url "$MAC_X64_URL" --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg mac_arm_url "$MAC_ARM_URL" --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg linux_url "$LINUX_URL" --arg linux_sig "$LINUX_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { url: $win_x64_url, signature: $win_x64_sig },
                "windows-aarch64": { url: $win_arm_url, signature: $win_arm_sig },
                "darwin-x86_64": { url: $mac_x64_url, signature: $mac_x64_sig },
                "darwin-aarch64": { url: $mac_arm_url, signature: $mac_arm_sig },
                "linux-x86_64": { url: $linux_url, signature: $linux_sig }
              }
            }' > latest.json
          
          gh release upload $VERSION latest.json --clobber


      - name: Make release public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release edit $VERSION --draft=false

      - name: Update latest tag
        continue-on-error: true # Prevents failure if workflow files are changed in the commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          git tag -f latest $VERSION
          git push -f origin latest -f
