name: "Publish Release"

on:
  push:
    branches:
      - main

jobs:
  check-version:
    name: "Check Version"
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      body: ${{ steps.check.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check version and extract changelog
        id: check
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            
            # Extract changelog
            node -e "
              const fs = require('fs');
              const version = '$VERSION';
              const content = fs.readFileSync('Changelog.md', 'utf8').split('\n');
              const startIdx = content.findIndex(l => l.startsWith('## ' + version));
              if (startIdx === -1) {
                fs.writeFileSync('extracted_changelog.txt', '### Version ' + version + '\n\nInitial Release');
                process.exit(0);
              }
              const nextIdx = content.slice(startIdx + 1).findIndex(l => l.startsWith('## '));
              const body = content.slice(startIdx + 1, nextIdx === -1 ? undefined : startIdx + 1 + nextIdx).join('\n').trim();
              fs.writeFileSync('extracted_changelog.txt', body);
            "
            
            DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "body<<$DELIMITER" >> $GITHUB_OUTPUT
            cat extracted_changelog.txt >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$DELIMITER" >> $GITHUB_OUTPUT
          fi

  build:
    name: "Build ${{ matrix.os_name }}"
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest-amd64, macos-latest-arm64, ubuntu-22.04, windows-latest, windows-latest-arm64]
        include:
          - platform: macos-latest-arm64
            real_platform: macos-latest
            arch: aarch64
            os_name: "macOS (Apple Silicon)"
            args: "--target aarch64-apple-darwin --bundles app"
          - platform: macos-latest-amd64
            real_platform: macos-latest
            arch: x64
            os_name: "macOS (Intel)"
            args: "--target x86_64-apple-darwin --bundles app"
          - platform: ubuntu-22.04
            real_platform: ubuntu-22.04
            arch: x64
            os_name: "Linux"
            args: ""
          - platform: windows-latest
            real_platform: windows-latest
            arch: x64
            os_name: "Windows (x64)"
            args: ""
          - platform: windows-latest-arm64
            real_platform: windows-latest
            arch: arm64
            os_name: "Windows (ARM64)"
            args: "--target aarch64-pc-windows-msvc"

    runs-on: ${{ matrix.real_platform }}
    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.real_platform == 'macos-latest' && (matrix.arch == 'x64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin') || (matrix.real_platform == 'windows-latest' && matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || '') }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.real_platform }}-${{ matrix.arch }}

      - name: install dependencies (ubuntu only)
        if: matrix.real_platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: setup bins (Windows)
        if: matrix.real_platform == 'windows-latest'
        run: ./setup_bin.ps1

      - name: setup bins (Unix)
        if: matrix.real_platform != 'windows-latest'
        run: chmod +x setup_bin.sh && ./setup_bin.sh

      - name: install frontend dependencies
        run: npm install

      - name: build and bundle
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APTABASE_API_KEY: ${{ secrets.APTABASE_API_KEY }}
        with:
          args: ${{ matrix.args }}

      - name: Package macOS DMG
        if: matrix.real_platform == 'macos-latest'
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          chmod +x scripts/macos/build.sh
          ARCH_OVERRIDE="${{ matrix.arch }}" ./scripts/macos/build.sh
          
          # Re-sign the final custom DMG
          DMG_FILE=$(ls dist/RipTune_${VERSION}_*.dmg | head -n 1)
          npx tauri signer sign -k "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" "$DMG_FILE" --password "${{ secrets.TAURI_SIGNING_PASSWORD }}" > "${DMG_FILE}.sig"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.exe.sig
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.AppImage.sig
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.rpm
            dist/*.dmg
            dist/*.dmg.sig

  publish:
    name: "Publish Release"
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./all-artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ needs.check-version.outputs.body }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release create $VERSION \
            --title "RipTune $VERSION" \
            --notes "$RELEASE_NOTES" \
            --draft

      - name: Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          find ./all-artifacts -type f \( -name "*.dmg" -o -name "*.dmg.sig" -o -name "*.exe" -o -name "*.exe.sig" -o -name "*.AppImage" -o -name "*.AppImage.sig" -o -name "*.deb" -o -name "*.rpm" \) -exec gh release upload $VERSION {} --clobber \;

      - name: Generate and upload latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ASSETS=$(gh release view $VERSION --json assets --jq '.assets')
          
          # Improved asset selection to avoid arch mixup
          WIN_X64_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | contains("_x64") and endswith(".exe")) | .url' | head -n 1)
          # Fallback if _x64 is not specifically in the name but it's the only one or default
          if [ -z "$WIN_X64_URL" ] || [ "$WIN_X64_URL" == "null" ]; then
            WIN_X64_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | (contains("_arm64") | not) and endswith(".exe")) | .url' | head -n 1)
          fi
          
          WIN_ARM64_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | contains("_arm64") and endswith(".exe")) | .url' | head -n 1)
          MAC_X64_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_x64.dmg")) | .url' | head -n 1)
          MAC_ARM_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_aarch64.dmg")) | .url' | head -n 1)
          LINUX_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".AppImage")) | .url' | head -n 1)

          get_sig() {
            local pattern=$1
            local exclude=$2
            local sig_name=$(echo "$ASSETS" | jq -r ".[] | select(.name | contains(\"$pattern\") and (if \"$exclude\" != \"\" then contains(\"$exclude\") | not else true end) and endswith(\".sig\")) | .name" | head -n 1)
            if [ "$sig_name" != "null" ] && [ -n "$sig_name" ]; then
              # Use gh release download to get the file content safely (handles draft permissions)
              gh release download $VERSION -p "$sig_name" -O -
            else
              echo ""
            fi
          }

          WIN_X64_SIG=$(get_sig "_x64" "_arm64")
          # Fallback for Windows x64 sig
          if [ -z "$WIN_X64_SIG" ]; then
             WIN_X64_SIG=$(get_sig ".exe" "_arm64")
          fi
          
          WIN_ARM64_SIG=$(get_sig "_arm64" "")
          MAC_X64_SIG=$(get_sig "_x64.dmg" "")
          MAC_ARM_SIG=$(get_sig "_aarch64.dmg" "")
          LINUX_SIG=$(get_sig ".AppImage" "")

          # JSON construction with correct arch mapping
          cat <<EOF > latest.json
          {
            "version": "$VERSION",
            "notes": "Version $VERSION release",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64": { "url": "$WIN_X64_URL", "signature": "$WIN_X64_SIG" },
              "windows-aarch64": { "url": "$WIN_ARM64_URL", "signature": "$WIN_ARM64_SIG" },
              "darwin-x86_64": { "url": "$MAC_X64_URL", "signature": "$MAC_X64_SIG" },
              "darwin-aarch64": { "url": "$MAC_ARM_URL", "signature": "$MAC_ARM_SIG" },
              "linux-x86_64": { "url": "$LINUX_URL", "signature": "$LINUX_SIG" }
            }
          }
          EOF
          
          gh release upload $VERSION latest.json --clobber

      - name: Make release public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release edit $VERSION --draft=false

      - name: Update latest tag
        continue-on-error: true # Prevents failure if workflow files are changed in the commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          git tag -f latest $VERSION
          git push -f origin latest -f
