name: "Publish Release"

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-version:
    name: "Check Version"
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      body: ${{ steps.check.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check version and extract changelog
        id: check
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            
            # Extract changelog
            node -e "
              const fs = require('fs');
              const version = '$VERSION';
              const content = fs.readFileSync('Changelog.md', 'utf8').split('\n');
              const startIdx = content.findIndex(l => l.startsWith('## ' + version));
              if (startIdx === -1) {
                fs.writeFileSync('extracted_changelog.txt', '### Version ' + version + '\n\nInitial Release');
                process.exit(0);
              }
              const nextIdx = content.slice(startIdx + 1).findIndex(l => l.startsWith('## '));
              const body = content.slice(startIdx + 1, nextIdx === -1 ? undefined : startIdx + 1 + nextIdx).join('\n').trim();
              fs.writeFileSync('extracted_changelog.txt', body);
            "
            
            DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "body<<$DELIMITER" >> $GITHUB_OUTPUT
            cat extracted_changelog.txt >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$DELIMITER" >> $GITHUB_OUTPUT
          fi

  build:
    name: "Build ${{ matrix.platform == 'ubuntu-22.04' && 'Linux' || matrix.platform == 'windows-latest' && 'Windows' || format('macOS ({0})', matrix.arch) }}"
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: aarch64
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            arch: x64
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            arch: x64
            args: ""
          - platform: windows-latest
            arch: x64
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && (matrix.arch == 'x64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin') || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: setup bins (Windows)
        if: matrix.platform == 'windows-latest'
        run: ./setup_bin.ps1

      - name: setup bins (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x setup_bin.sh && ./setup_bin.sh

      - name: install frontend dependencies
        run: npm install

      - name: build and bundle
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APTABASE_API_KEY: ${{ secrets.APTABASE_API_KEY }}
        with:
          # Note: No tagName means it only builds without creating a release
          args: ${{ matrix.args }}

      - name: Package macOS DMG
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          # 1. Run the custom build script
          chmod +x scripts/macos/build.sh
          ARCH_OVERRIDE="${{ matrix.arch }}" ./scripts/macos/build.sh
          
          # 2. Re-sign the final custom DMG for the updater
          # We pass the key content directly to avoid file path interpretation issues
          DMG_FILE=$(ls dist/RipTune_${VERSION}_*.dmg | head -n 1)
          
          # Sign using tauri-cli
          npx tauri signer sign -k "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" "$DMG_FILE" --password "${{ secrets.TAURI_SIGNING_PASSWORD }}" > "${DMG_FILE}.sig"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/x86_64-apple-darwin/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-apple-darwin/release/bundle/nsis/*.exe.sig
            dist/*.dmg
            dist/*.dmg.sig

  publish:
    name: "Publish Release"
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: List downloaded files (Debug)
        run: ls -R ./all-artifacts

      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release create $VERSION \
            --title "RipTune $VERSION" \
            --notes "${{ needs.check-version.outputs.body }}" \
            --draft

      - name: Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Find all binaries and signatures in the merged artifacts folder
          find ./all-artifacts -type f \( -name "*.dmg" -o -name "*.dmg.sig" -o -name "*.exe" -o -name "*.exe.sig" -o -name "*.AppImage" -o -name "*.AppImage.sig" \) -exec gh release upload $VERSION {} --clobber \;

      - name: Generate and upload latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          ASSETS=$(gh release view $VERSION --json assets --jq '.assets')
          
          WIN_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".exe")) | .url' | head -n 1)
          MAC_X64_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_x64.dmg")) | .url' | head -n 1)
          MAC_ARM_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_aarch64.dmg")) | .url' | head -n 1)
          LINUX_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".AppImage")) | .url' | head -n 1)

          get_sig() {
            local pattern=$1
            local sig_url=$(echo "$ASSETS" | jq -r ".[] | select(.name | contains(\"$pattern\") and endswith(\".sig\")) | .url" | head -n 1)
            if [ "$sig_url" != "null" ] && [ -n "$sig_url" ]; then curl -sL "$sig_url"; else echo ""; fi
          }

          WIN_SIG=$(get_sig ".exe")
          MAC_X64_SIG=$(get_sig "_x64.dmg")
          MAC_ARM_SIG=$(get_sig "_aarch64.dmg")
          LINUX_SIG=$(get_sig ".AppImage")

          cat <<EOF > latest.json
          {
            "version": "$VERSION",
            "notes": "Version $VERSION release",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64": { "url": "$WIN_URL", "signature": "$WIN_SIG" },
              "darwin-x86_64": { "url": "$MAC_X64_URL", "signature": "$MAC_X64_SIG" },
              "darwin-aarch64": { "url": "$MAC_ARM_URL", "signature": "$MAC_ARM_SIG" },
              "linux-x86_64": { "url": "$LINUX_URL", "signature": "$LINUX_SIG" }
            }
          }
          EOF
          
          gh release upload $VERSION latest.json --clobber

      - name: Make release public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release edit $VERSION --draft=false

      - name: Update latest tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          git tag -f latest $VERSION
          git push -f origin latest -f
