name: "Publish Release"

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check if version is new
        id: check
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  publish-tauri:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    outputs:
      version: ${{ steps.changelog.outputs.version }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: install frontend dependencies
        run: npm install

      - name: get version and extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          node -e "
            const fs = require('fs');
            const version = '$VERSION';
            const log = fs.readFileSync('Changelog.md', 'utf8');
            const regex = new RegExp('## ' + version.replace('.', '\\.') + '.*?[\\n\\r]([\\s\\S]*?)(## |$)');
            const match = log.match(regex);
            const body = match ? match[1].trim() : '### Version ' + version + '\n\nNew release.';
            fs.writeFileSync('extracted_changelog.txt', body);
          "
          
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          cat extracted_changelog.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        with:
          tagName: __VERSION__
          releaseName: "RipTune __VERSION__"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: false

  finalize-release:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make release public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ needs.publish-tauri.outputs.version }} --draft=false

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          git tag -f latest ${{ needs.publish-tauri.outputs.version }}
          git push -f origin latest -f
