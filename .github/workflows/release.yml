name: "Publish Release"

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check if version is new
        id: check
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  publish-tauri:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    outputs:
      version: ${{ steps.changelog.outputs.version }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: setup bins (Windows)
        if: matrix.platform == 'windows-latest'
        run: ./setup_bin.ps1

      - name: setup bins (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x setup_bin.sh && ./setup_bin.sh

      - name: install frontend dependencies
        run: npm install

      - name: get version and extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          node -e "
            const fs = require('fs');
            const version = '$VERSION';
            const content = fs.readFileSync('Changelog.md', 'utf8').split('\n');
            const startIdx = content.findIndex(l => l.startsWith('## ' + version));
            if (startIdx === -1) {
              fs.writeFileSync('extracted_changelog.txt', '### Version ' + version + '\n\nInitial Release');
              process.exit(0);
            }
            const nextIdx = content.slice(startIdx + 1).findIndex(l => l.startsWith('## '));
            const body = content.slice(startIdx + 1, nextIdx === -1 ? undefined : startIdx + 1 + nextIdx).join('\n').trim();
            fs.writeFileSync('extracted_changelog.txt', body);
          "
          
          # Use a unique delimiter to handle multiline output safely
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "body<<$DELIMITER" >> $GITHUB_OUTPUT
          cat extracted_changelog.txt >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: build and bundle
        id: tauri_build
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APTABASE_API_KEY: ${{ secrets.APTABASE_API_KEY }}
        with:
          tagName: __VERSION__
          releaseName: "RipTune __VERSION__"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false

      - name: Package macOS DMG (Custom)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          # Temporary folder structure
          mkdir -p RipTune_Setup
          cp -r src-tauri/target/release/bundle/macos/RipTune.app RipTune_Setup/
          cp fix-mac-permissions.command RipTune_Setup/
          cp README_MAC.txt RipTune_Setup/READ_ME.txt
          chmod +x RipTune_Setup/fix-mac-permissions.command
          
          # Add shortcut to /Applications for convenience
          ln -s /Applications RipTune_Setup/Applications
          
          # Final DMG name with standard naming convention
          DMG_NAME="RipTune_${VERSION}_x64.dmg"
          hdiutil create -volname "RipTune Installer" -srcfolder RipTune_Setup -ov -format UDZO $DMG_NAME
          
          # Clean release: delete the default .dmg and .app.tar.gz created by Tauri
          # so we only offer this complete, self-healing custom DMG
          gh release delete-asset $VERSION RipTune_${VERSION}_x64.dmg --yes || true
          gh release delete-asset $VERSION RipTune_${VERSION}_x64.app.tar.gz --yes || true
          
          # Upload final DMG
          gh release upload $VERSION $DMG_NAME --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  finalize-release:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make release public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ needs.publish-tauri.outputs.version }} --draft=false

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          git tag -f latest ${{ needs.publish-tauri.outputs.version }}
          git push -f origin latest -f

      - name: Generate and upload latest.json
        shell: bash
        run: |
          VERSION="${{ needs.publish-tauri.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Get all assets links from the release
          ASSETS=$(gh release view $VERSION --json assets --jq '.assets')
          
          # Find specific assets for each platform
          WIN_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".exe")) | .url' | head -n 1)
          MAC_X64_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_x64.dmg")) | .url' | head -n 1)
          MAC_ARM_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("_aarch64.dmg")) | .url' | head -n 1)
          LINUX_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".AppImage")) | .url' | head -n 1)

          # Function to get signature content from .sig files
          get_sig() {
            local pattern=$1
            local sig_url=$(echo "$ASSETS" | jq -r ".[] | select(.name | contains(\"$pattern\") and endswith(\".sig\")) | .url" | head -n 1)
            if [ "$sig_url" != "null" ] && [ -n "$sig_url" ]; then
              curl -sL "$sig_url"
            else
              echo ""
            fi
          }

          WIN_SIG=$(get_sig ".exe")
          MAC_X64_SIG=$(get_sig "_x64.dmg")
          MAC_ARM_SIG=$(get_sig "_aarch64.dmg")
          LINUX_SIG=$(get_sig ".AppImage")

          # Create the latest.json (v2 format)
          cat <<EOF > latest.json
          {
            "version": "$VERSION",
            "notes": "Version $VERSION release",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64": { "url": "$WIN_URL", "signature": "$WIN_SIG" },
              "darwin-x86_64": { "url": "$MAC_X64_URL", "signature": "$MAC_X64_SIG" },
              "darwin-aarch64": { "url": "$MAC_ARM_URL", "signature": "$MAC_ARM_SIG" },
              "linux-x86_64": { "url": "$LINUX_URL", "signature": "$LINUX_SIG" }
            }
          }
          EOF
          
          gh release upload $VERSION latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
