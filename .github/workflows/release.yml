name: "Publish Release"

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check if version is new
        id: check
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  publish-tauri:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    outputs:
      version: ${{ steps.changelog.outputs.version }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: setup bins (Windows)
        if: matrix.platform == 'windows-latest'
        run: ./setup_bin.ps1

      - name: setup bins (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x setup_bin.sh && ./setup_bin.sh

      - name: install frontend dependencies
        run: npm install

      - name: get version and extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          node -e "
            const fs = require('fs');
            const version = '$VERSION';
            const content = fs.readFileSync('Changelog.md', 'utf8').split('\n');
            const startIdx = content.findIndex(l => l.startsWith('## ' + version));
            if (startIdx === -1) {
              fs.writeFileSync('extracted_changelog.txt', '### Version ' + version + '\n\nInitial Release');
              process.exit(0);
            }
            const nextIdx = content.slice(startIdx + 1).findIndex(l => l.startsWith('## '));
            const body = content.slice(startIdx + 1, nextIdx === -1 ? undefined : startIdx + 1 + nextIdx).join('\n').trim();
            fs.writeFileSync('extracted_changelog.txt', body);
          "
          
          # Use a unique delimiter to handle multiline output safely
          DELIMITER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "body<<$DELIMITER" >> $GITHUB_OUTPUT
          cat extracted_changelog.txt >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: build and bundle
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APTABASE_API_KEY: ${{ secrets.APTABASE_API_KEY }}
        with:
          tagName: __VERSION__
          releaseName: "RipTune __VERSION__"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false

      - name: Clean up and rename assets (yt-dlp style)
        shell: bash
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          mkdir -p clean_assets
          
          # Match and rename based on extension
          find src-tauri/target/release/bundle -maxdepth 2 -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) | while read file; do
            filename=$(basename "$file")
            
            # Simplified naming logic
            if [[ "$filename" == *".msi" ]]; then new_name="RipTune.msi";
            elif [[ "$filename" == *"-setup.exe" ]]; then new_name="RipTune.exe";
            elif [[ "$filename" == *".dmg" ]]; then new_name="RipTune.dmg";
            elif [[ "$filename" == *".AppImage" ]]; then new_name="RipTune.AppImage";
            elif [[ "$filename" == *".deb" ]]; then new_name="RipTune.deb";
            else continue; fi
            
            echo "Renaming $filename to $new_name"
            cp "$file" "clean_assets/$new_name"
          done

      - name: Upload clean assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          # Upload files to the existing release created by tauri-build
          for file in clean_assets/*; do
            if [ -f "$file" ]; then
              gh release upload "$VERSION" "$file" --clobber
            fi
          done

  finalize-release:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make release public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ needs.publish-tauri.outputs.version }} --draft=false

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          git tag -f latest ${{ needs.publish-tauri.outputs.version }}
          git push -f origin latest -f
