<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="28" ry="28" fill="#0a0f1c"/>

  <!-- Waveform bars -->
  <rect x="18" y="54" width="10" height="20" rx="5" fill="url(#g1)" opacity="0.7"/>
  <rect x="32" y="42" width="10" height="44" rx="5" fill="url(#g1)" opacity="0.85"/>
  <rect x="46" y="34" width="10" height="60" rx="5" fill="url(#g1)"/>
  <rect x="60" y="46" width="10" height="36" rx="5" fill="url(#g1)" opacity="0.9"/>
  <rect x="74" y="38" width="10" height="52" rx="5" fill="url(#g1)"/>
  <rect x="88" y="50" width="10" height="28" rx="5" fill="url(#g1)" opacity="0.8"/>
  <rect x="102" y="56" width="10" height="16" rx="5" fill="url(#g1)" opacity="0.6"/>
</svg>
